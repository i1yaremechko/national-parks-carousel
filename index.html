<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>National Parks Carousel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header__subtitle">Explore USA</div>
        <h1 class="header__title">National Parks</h1>
      </header>

      <main class="carousel-section">
        <div class="carousel">
          <div class="carousel__wrapper">
            <div id="carousel-track" class="carousel__track"></div>
          </div>

          <div class="carousel__controls">
            <button id="btn-prev" class="carousel__btn" aria-label="Previous slide">←</button>
            <button id="btn-next" class="carousel__btn" aria-label="Next slide">→</button>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div class="footer__container">
          <div class="footer__left">
            <span class="footer__logo-icon">📙</span>
            <span class="footer__logo-text">National Parks</span>
          </div>

          <div class="footer__center">
            <p class="footer__author">
              Created by <span class="footer__author-highlight">Gromcode</span>
              <img
                src="https://sage-faun-b5ffcf.netlify.app/images/footer/gromcode_logo.svg"
                alt="Gromcode Logo"
                class="footer__logo-img"
              />
            </p>
            <p class="footer__copyright">&copy; National Parks, 2026</p>
          </div>

          <div class="footer__right">
            <a href="#" class="footer__social-btn" target="_blank">𝕏</a>
            <a href="#" class="footer__social-btn" target="_blank">f</a>
            <a href="#" class="footer__social-btn" target="_blank">📷</a>
          </div>
        </div>
      </footer>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
